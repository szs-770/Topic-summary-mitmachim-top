<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מתמחים טופ AI - סקריפט סיכום חכם</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        /* הגדרות צבעים ומשתנים */
        :root {
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary-gradient: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            --glass-border: 1px solid rgba(0, 0, 0, 0.05);
            --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            --feature-bg: rgba(0, 0, 0, 0.02);
            --badge-bg: rgba(37, 99, 235, 0.1);
            --theme-btn-bg: #fff;
            --theme-btn-color: #333;
        }

        /* מצב כהה (מופעל ע"י קלאס או מערכת) */
        [data-theme="dark"] {
            --bg-color: #0a0f1a;
            --card-bg: rgba(19, 27, 47, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --glass-border: 1px solid rgba(255, 255, 255, 0.05);
            --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            --feature-bg: rgba(255, 255, 255, 0.02);
            --badge-bg: rgba(59, 130, 246, 0.2);
            --theme-btn-bg: #1e293b;
            --theme-btn-color: #fff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s ease; }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            background-attachment: fixed;
        }

        /* כפתור החלפת ערכת נושא */
        .theme-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: var(--theme-btn-bg);
            color: var(--theme-btn-color);
            border: var(--glass-border);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 60px 20px; }

        .hero { text-align: center; padding: 60px 20px; margin-bottom: 20px; }
        
        .hero h1 {
            font-size: 4rem; font-weight: 800; margin-bottom: 20px;
            background: var(--primary-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .btn-glow {
            display: inline-flex; align-items: center; gap: 12px;
            background: var(--primary-gradient); color: white;
            padding: 18px 45px; font-size: 1.4rem; font-weight: 700;
            text-decoration: none; border-radius: 50px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        /* תצוגת הגיפ */
        .demo-container {
            width: 100%;
            max-width: 800px;
            margin: 40px auto;
            border-radius: 20px;
            overflow: hidden;
            border: var(--glass-border);
            box-shadow: var(--card-shadow);
        }

        .demo-container img {
            width: 100%;
            display: block;
        }

        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(12px);
            border: var(--glass-border); border-radius: 24px;
            padding: 40px; margin-bottom: 40px; box-shadow: var(--card-shadow);
        }

        .features-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px;
        }

        .feature-item {
            background: var(--feature-bg); padding: 25px; border-radius: 16px; border: var(--glass-border);
        }

        .feature-icon {
            font-size: 2rem; background: var(--primary-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px;
        }

        footer { text-align: center; padding: 40px 20px; color: var(--text-muted); border-top: var(--glass-border); margin-top: 60px; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.8rem; }
            .container { padding: 30px 15px; }
        }
    </style>
</head>
<body data-theme="light">

    <button class="theme-toggle" id="themeToggle" title="החלף מצב כהה/בהיר">
        <i class="fa-solid fa-moon"></i>
    </button>

    <div class="container">
        
        <header class="hero" data-aos="zoom-out">
            <div class="version-badge" style="background: var(--badge-bg); color: #3b82f6; padding: 6px 15px; border-radius: 50px; display: inline-block; margin-bottom: 15px; font-weight: bold;">גרסה 7.0 - Ultimate</div>
            <h1>מתמחים טופ AI</h1>
            <p style="font-size: 1.3rem; color: var(--text-muted); margin-bottom: 30px;">הבינה המלאכותית שחוסכת לכם שעות של קריאה בפורום.</p>
            
            <a href="https://github.com/szs-770/mitmachim-summarizer/raw/refs/heads/main/mitmachim-ai.user.js" class="btn-glow">
                <i class="fa-solid fa-cloud-arrow-down"></i> התקן עכשיו
            </a>
        </header>

        <div class="demo-container" data-aos="fade-up">
            <img src="demo.gif" alt="הדגמת הסקריפט בפעולה">
        </div>

        <section class="glass-card" data-aos="fade-up">
            <h2 style="margin-bottom: 25px; font-size: 1.8rem;"><i class="fa-solid fa-wand-magic-sparkles" style="color:#3b82f6;"></i> מה חדש?</h2>
            <div class="features-grid">
                <div class="feature-item">
                    <div class="feature-icon"><i class="fa-solid fa-comments"></i></div>
                    <h3>צ'אט חכם</h3>
                    <p>שאלו שאלות על הדיון וקבלו תשובות מדויקות מה-AI בתוך שניות.</p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon"><i class="fa-solid fa-clock-rotate-left"></i></div>
                    <h3>היסטוריה</h3>
                    <p>גישה מלאה לכל הסיכומים הקודמים שביצעתם מכל מכשיר.</p>
                </div>
            </div>
        </section>

    </div>

    <footer>
        <p>פותח לטובת קהילת מתמחים טופ 💎</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // אנימציות גלילה
        AOS.init({ duration: 1000, once: true });

        // ניהול מצב כהה/בהיר
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        const icon = themeToggle.querySelector('i');

        // בדיקה אם יש הגדרה שמורה או לפי מערכת
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme) {
            setTheme(savedTheme);
        } else if (prefersDark) {
            setTheme('dark');
        }

        themeToggle.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        function setTheme(theme) {
            body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            icon.className = theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }
    </script>
</body>
</html>
